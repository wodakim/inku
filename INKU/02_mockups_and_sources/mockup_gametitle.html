<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inkü - Écran de Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            touch-action: none; 
            height: 100dvh; 
        }

        /* --- BACKGROUND LABORATOIRE INDUSTRIEL AAA --- */
        .lab-bg-container {
            position: fixed;
            inset: 0;
            background-color: #04060c; 
            background-image: radial-gradient(circle at 50% 30%, #0a1128 0%, #04060c 70%);
            z-index: 0;
            overflow: hidden;
            box-shadow: inset 0 0 150px rgba(0,0,0,1);
        }

        .ambient-fog {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.2;
            animation: fog-drift 15s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .fog-1 { top: -10%; right: -10%; width: 60vw; height: 60vw; background: #10b981; }
        .fog-2 { bottom: 20%; left: -20%; width: 70vw; height: 70vw; background: #3b82f6; animation-delay: -5s; }

        @keyframes fog-drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-30px, 20px) scale(1.1); }
        }

        .wall-plates {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.8) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.8) 2px, transparent 2px),
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
            background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
            opacity: 0.5;
            z-index: 1;
        }

        .industrial-pipe {
            position: absolute;
            background: linear-gradient(90deg, #010204 0%, #1e293b 25%, #475569 40%, #1e293b 60%, #04060c 100%);
            box-shadow: 15px 0 30px rgba(0,0,0,0.9), inset -2px 0 5px rgba(255,255,255,0.05);
            z-index: 2;
            opacity: 0.6;
        }
        .pipe-vertical { width: 35px; height: 100%; left: -5px; top: 0; border-right: 1px solid #000; }
        .pipe-horizontal { width: 100%; height: 28px; top: -2px; border-bottom: 1px solid #000; box-shadow: 0 15px 30px rgba(0,0,0,0.9), inset 0 -2px 5px rgba(255,255,255,0.05); }

        .server-rack {
            position: absolute;
            left: -25px; top: 15%; width: 80px; height: 180px;
            background: linear-gradient(to bottom, #0f172a, #020617);
            border: 2px solid #000; border-right: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
            box-shadow: inset 5px 0 15px rgba(0,0,0,1), 15px 15px 30px rgba(0,0,0,0.9);
            padding: 10px 6px; display: flex; flex-direction: column; gap: 10px;
            z-index: 1; transform: perspective(400px) rotateY(25deg); opacity: 0.45;
        }
        .server-slot { height: 14px; background: #000; border: 1px solid #1e293b; border-bottom-color: rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 5px; gap: 5px; }
        .server-led { width: 3px; height: 3px; border-radius: 50%; background: #10b981; box-shadow: 0 0 4px #10b981; }
        .server-led.red-alert { background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: alert-blink 1s infinite alternate; }
        .server-led.blue { background: #3b82f6; box-shadow: 0 0 6px #3b82f6; animation: alert-blink 2s infinite alternate-reverse; }
        .server-led.off { background: #1e293b; box-shadow: none; }

        @keyframes alert-blink { 0%, 20% { opacity: 1; } 80%, 100% { opacity: 0.3; } }

        .dust-motes { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
        .mote { position: absolute; background: #fff; border-radius: 50%; opacity: 0; box-shadow: 0 0 4px #fff; animation: mote-float linear infinite; }
        @keyframes mote-float {
            0% { transform: translateY(110vh) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 0.3; } 90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(30px) scale(1.5); opacity: 0; }
        }

        .warning-tape {
            position: absolute; width: 120%; height: 20px; bottom: 3%; left: -10%;
            background: repeating-linear-gradient(45deg, #b45309 0px, #b45309 20px, #1c1917 20px, #1c1917 40px);
            transform: rotate(-3deg); box-shadow: 0 5px 15px rgba(0,0,0,0.9); opacity: 0.15; z-index: 1;
            border-top: 1px solid #000; border-bottom: 1px solid #000;
        }

        /* --- INCUBATEUR --- */
        .incubator-container {
            height: 100%;
            max-height: 380px; 
            aspect-ratio: 2 / 3; 
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .metal-surface {
            background: linear-gradient(90deg, #0f172a 0%, #334155 15%, #475569 25%, #1e293b 50%, #0f172a 85%, #020617 100%);
            width: 100%; flex-shrink: 0; position: relative;
        }

        .incubator-cap-top { height: 35px; border-radius: 12px 12px 0 0; border-top: 2px solid rgba(255, 255, 255, 0.3); border-bottom: 2px solid #020617; display: flex; flex-direction: column; justify-content: flex-end; z-index: 10; }
        .metal-ridge { height: 4px; width: 100%; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 6px; }
        .neon-rim { height: 4px; width: 100%; background: #10b981; box-shadow: 0 0 15px #10b981, inset 0 0 5px #fff; }

        .incubator-glass {
            width: 100%; flex-grow: 1;
            background: 
                linear-gradient(180deg, rgba(16, 185, 129, 0) 40%, rgba(16, 185, 129, 0.2) 100%),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0%, transparent 10%, transparent 90%, rgba(0, 0, 0, 0.6) 100%);
            border-left: 2px solid rgba(255, 255, 255, 0.3); border-right: 2px solid rgba(0, 0, 0, 0.8);
            box-shadow: inset 15px 0 20px -10px rgba(255, 255, 255, 0.15), inset -20px 0 30px -10px rgba(0, 0, 0, 0.8), inset 0 -40px 50px -15px rgba(16, 185, 129, 0.4);
            position: relative; overflow: hidden; backdrop-filter: blur(2px); z-index: 5; cursor: pointer;
        }

        .glass-grid { position: absolute; inset: 0; background-image: radial-gradient(rgba(16, 185, 129, 0.25) 1px, transparent 1px); background-size: 10px 10px; opacity: 0.3; z-index: 1; pointer-events: none; }
        .holo-scanline { position: absolute; left: 0; right: 0; height: 2px; background: rgba(16, 185, 129, 0.9); box-shadow: 0 0 10px rgba(16, 185, 129, 0.9), 0 0 25px rgba(16, 185, 129, 0.5); z-index: 4; opacity: 0.6; animation: scan 5s linear infinite; }
        @keyframes scan { 0% { top: -10%; opacity: 0; } 5% { opacity: 0.8; } 95% { opacity: 0.8; } 100% { top: 110%; opacity: 0; } }
        .glass-reflection { position: absolute; top: 0; left: 12%; width: 15%; height: 100%; background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.15) 30%, rgba(255, 255, 255, 0.5) 50%, rgba(255, 255, 255, 0.15) 70%, transparent 100%); z-index: 6; pointer-events: none; mix-blend-mode: overlay; }

        .incubator-cap-bottom { height: 50px; border-radius: 0 0 12px 12px; border-top: 2px solid #020617; border-bottom: 2px solid rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; justify-content: flex-start; z-index: 10; }
        .cap-vents { display: flex; justify-content: space-evenly; width: 70%; margin: 6px auto 4px auto; }
        .vent-slot { width: 5px; height: 14px; background: #020617; border-radius: 1px; box-shadow: inset 0 2px 5px rgba(0,0,0,1), 0 1px 0 rgba(255,255,255,0.15); }

        .holo-hud { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; align-items: flex-end; z-index: 6; pointer-events: none; }
        .holo-text { font-family: 'Courier New', Courier, monospace; font-size: 7px; color: #34d399; text-shadow: 0 0 4px #10b981; margin-bottom: 2px; opacity: 0.85; font-weight: 900; letter-spacing: 0.5px; }
        .holo-bar { width: 30px; height: 3px; background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); margin-bottom: 5px; position: relative; }
        .holo-bar-fill { position: absolute; top: 0; left: 0; height: 100%; width: 98%; background: #10b981; box-shadow: 0 0 6px #10b981; }

        /* --- STYLES AAA POUR LE PANNEAU DE CONNEXION --- */
        .login-card-aaa {
            background: linear-gradient(180deg, rgba(11, 17, 32, 0.7) 0%, rgba(2, 6, 23, 0.85) 100%);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.15);
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.9), inset 0 1px 1px rgba(255, 255, 255, 0.05), inset 0 0 20px rgba(16, 185, 129, 0.05);
            border-radius: 20px;
            /* La hauteur s'adapte désormais parfaitement à son contenu (Pro UI) */
            height: auto; 
            padding: 1.5rem 1.25rem;
            width: 100%;
            max-width: 320px; /* Contraint la largeur pour éviter l'effet "brique" */
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        .login-card-aaa::before { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 1px; background: linear-gradient(90deg, transparent, rgba(52, 211, 153, 0.6), transparent); opacity: 0.8; }

        .btn-aaa {
            background: linear-gradient(90deg, #047857 0%, #10b981 50%, #047857 100%); background-size: 200% auto;
            border: 1px solid rgba(52, 211, 153, 0.4);
            box-shadow: 0 6px 15px -4px rgba(16, 185, 129, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2), inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: shine-bg 3s linear infinite; padding: 0.65rem; border-radius: 12px;
        }
        .btn-aaa:active { box-shadow: 0 0 8px rgba(16, 185, 129, 0.4), inset 0 2px 4px rgba(0, 0, 0, 0.4); transform: translateY(2px); }
        @keyframes shine-bg { to { background-position: 200% center; } }

        .tech-badge { background: rgba(2, 6, 23, 0.6); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: inset 0 0 10px rgba(0,0,0,0.6); padding: 0.3rem 0.75rem; }
        .social-btn { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 4px rgba(0,0,0,0.2); padding: 0.6rem; border-radius: 10px; }

        .input-aaa {
            background: rgba(2, 6, 23, 0.4); border: 1px solid rgba(255, 255, 255, 0.08); color: white; transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); padding: 0.65rem 1rem 0.65rem 2.2rem; border-radius: 10px; font-size: 0.85rem;
        }
        .input-aaa:focus { outline: none; border-color: rgba(16, 185, 129, 0.6); box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 2px 4px rgba(0,0,0,0.5); background: rgba(2, 6, 23, 0.8); }
        
        .btn-secondary { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; transition: all 0.2s; padding: 0.6rem; border-radius: 10px; }
        .btn-secondary:hover { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.6); }
        .btn-secondary:active { transform: scale(0.97); }

        /* --- CÂBLES INDUSTRIELS --- */
        .cable-bundle { position: absolute; left: 50%; transform: translateX(-50%); width: 60px; z-index: 1; display: flex; align-items: stretch; justify-content: space-evenly; padding: 0 3px; background: linear-gradient(90deg, #020617 0%, #1e293b 30%, #0f172a 50%, #1e293b 70%, #020617 100%); box-shadow: inset 0 0 15px #000, 0 0 20px rgba(0,0,0,0.8); border-left: 2px solid #334155; border-right: 2px solid #334155; }
        .cable-bundle.top { top: -100px; bottom: 50%; } .cable-bundle.bottom { top: 50%; bottom: -100px; }
        .inner-wire { height: 100%; position: relative; } .inner-wire::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(255,255,255,0.15) 50%, rgba(0,0,0,0.8) 100%); }
        .wire-1 { width: 5px; background-color: #022c22; } .wire-2 { width: 10px; background-color: #0f172a; } .wire-3 { width: 3px; background-color: #450a0a; } .wire-4 { width: 7px; background-color: #1e293b; }
        .cable-binding { position: absolute; left: -2px; right: -2px; height: 12px; background: linear-gradient(90deg, #1e293b, #64748b, #1e293b); box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.3); border-top: 1px solid #020617; border-bottom: 1px solid #020617; border-radius: 2px; z-index: 2; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .led { width: 5px; height: 5px; border-radius: 50%; background-color: #10b981; box-shadow: 0 0 8px #10b981; margin: 0 3px; }

        canvas { display: block; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .title-glow { text-shadow: 0 0 20px rgba(16, 185, 129, 0.8), 0 0 40px rgba(16, 185, 129, 0.4); }

        /* Gestion professionnelle des "Safe Areas" (barre de navigation iOS/Android) */
        .safe-area-pb {
            padding-bottom: max(2.5rem, calc(env(safe-area-inset-bottom) + 1.2rem));
        }

        /* =========================================================
           RÈGLES RESPONSIVES MAGIQUES (Empêche tout dépassement) 
           ========================================================= */
        @media (max-height: 750px) {
            .safe-area-pb { padding-bottom: max(1.5rem, calc(env(safe-area-inset-bottom) + 0.8rem)); }
            .login-card-aaa { padding: 1rem; }
            #view-auth, #view-play { gap: 0.6rem !important; }
            .input-aaa { padding-top: 0.5rem; padding-bottom: 0.5rem; font-size: 0.8rem; }
            .btn-aaa { padding-top: 0.6rem; padding-bottom: 0.6rem; font-size: 0.95rem; }
            .social-btn, .btn-secondary { padding-top: 0.5rem; padding-bottom: 0.5rem; font-size: 0.7rem; }
            .title-glow { font-size: 2.7rem; line-height: 1; }
        }
        
        @media (max-height: 650px) {
            .safe-area-pb { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
            .login-card-aaa { padding: 0.75rem 1rem; border-radius: 16px; max-width: 290px; }
            #view-auth, #view-play { gap: 0.4rem !important; }
            .tech-badge { padding: 0.25rem 0.5rem; }
            .title-glow { font-size: 2.2rem; }
            .incubator-container { max-height: 280px; } 
        }
    </style>
</head>
<body class="text-white w-full relative select-none">

    <!-- Background Layer Laboratoire Industriel (Fixe) -->
    <div class="lab-bg-container">
        <div class="ambient-fog fog-1"></div>
        <div class="ambient-fog fog-2"></div>
        <div class="wall-plates"></div>
        <div class="industrial-pipe pipe-vertical"></div>
        <div class="industrial-pipe pipe-horizontal"></div>

        <div class="server-rack">
            <div class="server-slot"><div class="server-led red-alert"></div><div class="server-led off"></div></div>
            <div class="server-slot"><div class="server-led off"></div><div class="server-led blue"></div></div>
            <div class="server-slot" style="margin-top: 25px;"><div class="server-led blue"></div><div class="server-led"></div><div class="server-led off"></div></div>
            <div class="server-slot"><div class="server-led off"></div><div class="server-led"></div><div class="server-led off"></div></div>
            <div class="server-slot"><div class="server-led red-alert"></div><div class="server-led off"></div></div>
        </div>

        <div class="dust-motes">
            <div class="mote" style="left: 10%; width: 2px; height: 2px; animation-duration: 25s; animation-delay: 0s;"></div>
            <div class="mote" style="left: 85%; width: 3px; height: 3px; animation-duration: 18s; animation-delay: -5s;"></div>
            <div class="mote" style="left: 60%; width: 1.5px; height: 1.5px; animation-duration: 30s; animation-delay: -12s;"></div>
            <div class="mote" style="left: 25%; width: 2.5px; height: 2.5px; animation-duration: 22s; animation-delay: -8s;"></div>
            <div class="mote" style="left: 70%; width: 2px; height: 2px; animation-duration: 28s; animation-delay: -15s;"></div>
        </div>
        <div class="warning-tape"></div>
    </div>

    <!-- STRUCTURE PRINCIPALE EN COLONNE HYPER FLUIDE -->
    <div class="relative z-20 flex flex-col h-full w-full max-w-md mx-auto">
        
        <!-- Top Bar: Settings & Info -->
        <div class="p-2 sm:p-4 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-2 sm:gap-3">
                <button class="text-gray-300 hover:text-white text-lg sm:text-xl px-2 active:scale-95 transition">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="glass-panel px-3 py-1.5 rounded-full flex items-center gap-2 text-[10px] sm:text-xs text-gray-300" style="background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1);">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span>Serveur: EU-Ouest</span>
                </div>
            </div>
            <button class="w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-gray-300 hover:text-white transition active:scale-95" style="background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1);">
                <i class="fas fa-cog text-sm sm:text-base"></i>
            </button>
        </div>

        <!-- Title -->
        <div class="flex flex-col items-center flex-shrink-0 mt-0 sm:mt-1 relative z-20">
            <h1 class="text-4xl sm:text-5xl font-black text-white title-glow tracking-tight" style="font-family: 'Nunito', sans-serif;">
                Inkü
            </h1>
            <p class="text-emerald-400 text-[9px] sm:text-xs tracking-widest mt-1 font-bold uppercase opacity-80">Incubateur Virtuel</p>
        </div>

        <!-- Zone du Milieu (Flex-1 avec min-h-0 est crucial pour empêcher le dépassement) -->
        <div class="flex-1 w-full flex items-center justify-center px-4 py-2 min-h-0 relative z-10">
            
            <div class="cable-bundle top">
                <div class="inner-wire wire-1"></div><div class="inner-wire wire-2"></div><div class="inner-wire wire-3"></div><div class="inner-wire wire-4"></div><div class="inner-wire wire-1"></div>
                <div class="cable-binding" style="bottom: 15%;"></div><div class="cable-binding" style="bottom: 50%;"></div><div class="cable-binding" style="bottom: 85%;"></div>
            </div>
            
            <div class="cable-bundle bottom">
                <div class="inner-wire wire-1"></div><div class="inner-wire wire-2"></div><div class="inner-wire wire-3"></div><div class="inner-wire wire-4"></div><div class="inner-wire wire-1"></div>
                <div class="cable-binding" style="top: 15%;"></div><div class="cable-binding" style="top: 50%;"></div><div class="cable-binding" style="top: 85%;"></div>
            </div>

            <!-- Incubateur Fluide -->
            <div class="incubator-container">
                <div class="incubator-cap-top metal-surface">
                    <div class="metal-ridge"></div><div class="metal-ridge" style="width: 70%; margin: 0 auto 6px auto;"></div><div class="neon-rim"></div>
                </div>
                
                <div class="incubator-glass" id="glass-container">
                    <div class="glass-grid"></div><div class="holo-scanline"></div><div class="glass-reflection"></div>
                    <div class="holo-hud">
                        <div class="holo-text">O2_LEVEL</div><div class="holo-bar"><div class="holo-bar-fill"></div></div>
                        <div class="holo-text">TMP: 24.5°C</div><div class="holo-text">SYS: ON</div>
                    </div>
                    <canvas id="slimeCanvas"></canvas>
                </div>
                
                <div class="incubator-cap-bottom metal-surface">
                    <div class="neon-rim" style="height: 2px; opacity: 0.6; box-shadow: 0 0 10px #10b981;"></div>
                    <div class="cap-vents"><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div></div>
                    <div class="flex justify-center items-center gap-2 mt-0.5">
                        <div class="flex gap-1 items-center">
                            <div class="led"></div><div class="led" style="animation: pulse-glow 1s infinite alternate; background-color: #34d399;"></div><div class="led" style="background-color: #ef4444; box-shadow: 0 0 6px #ef4444; width:3px; height:3px;"></div>
                        </div>
                        <div class="text-[6px] text-emerald-400 font-mono tracking-widest bg-black/60 px-1 py-0.5 rounded border border-emerald-900/50 shadow-[inset_0_0_5px_rgba(0,0,0,1)]">UNIT-01</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Bar: Login Panel avec padding de sécurité (safe-area) -->
        <div class="px-4 w-full flex-shrink-0 relative z-30 flex justify-center safe-area-pb">
            <div class="login-card-aaa relative overflow-hidden flex flex-col justify-center" id="login-panel">
                
                <div class="absolute top-3 left-4 flex gap-1 opacity-50 pointer-events-none">
                    <div class="w-1 h-1 bg-emerald-500 rounded-full"></div><div class="w-1 h-1 bg-emerald-500/40 rounded-full"></div>
                </div>
                <div class="absolute top-3 right-4 flex gap-1 opacity-50 pointer-events-none">
                    <div class="w-4 h-0.5 bg-emerald-500/30 rounded-full"></div>
                </div>

                <div id="loading-overlay" class="absolute inset-0 bg-slate-900/95 backdrop-blur-xl z-50 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300">
                    <div class="relative w-12 h-12 mb-3">
                        <div class="absolute inset-0 border-[3px] border-emerald-500/20 rounded-full"></div>
                        <div class="absolute inset-0 border-[3px] border-t-emerald-400 border-l-emerald-400 border-r-transparent border-b-transparent rounded-full animate-spin"></div>
                        <i class="fas fa-fingerprint absolute inset-0 flex items-center justify-center text-emerald-500/50 text-lg animate-pulse"></i>
                    </div>
                    <p class="text-emerald-400 font-bold tracking-wide text-center px-4 text-xs" id="loading-text">Synchronisation ADN...</p>
                </div>

                <!-- VUE 1 : AUTHENTIFICATION -->
                <div id="view-auth" class="flex flex-col gap-3 w-full fade-in">
                    <div class="text-center mt-0 mb-2">
                        <h2 class="text-base font-black text-white tracking-wide">Accès Système</h2>
                        <p class="text-[9px] text-emerald-400/70 font-mono mt-0.5 uppercase tracking-widest">Identification requise</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="relative">
                            <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-emerald-500/50 text-xs"></i>
                            <input type="text" class="input-aaa w-full font-mono" placeholder="ID Joueur ou E-mail">
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-emerald-500/50 text-xs"></i>
                            <input type="password" class="input-aaa w-full font-mono" placeholder="Mot de passe">
                        </div>
                    </div>
                    <button id="btn-login" class="btn-aaa w-full text-white font-black tracking-wide mt-1 text-sm">CONNEXION</button>
                    <div class="flex gap-2">
                        <button class="btn-secondary flex-1 font-bold uppercase tracking-widest text-[9px]">S'inscrire</button>
                        <button id="btn-guest" class="social-btn flex-1 text-gray-300 hover:text-white transition font-bold uppercase tracking-widest active:scale-95 text-[9px]">Mode Invité</button>
                    </div>
                </div>

                <!-- VUE 2 : PRÊT À JOUER -->
                <div id="view-play" class="hidden flex-col gap-4 w-full fade-in">
                    <div class="flex justify-between items-center mt-0 px-1">
                        <div class="inline-flex items-center gap-1.5 tech-badge rounded-full">
                            <i class="fas fa-fingerprint text-emerald-500 text-[10px]"></i>
                            <p class="text-[9px] font-mono text-gray-300 uppercase tracking-widest">ID: <span class="text-emerald-400 font-bold" id="display-player-id">GUEST_8902</span></p>
                        </div>
                        <button id="btn-logout" class="text-gray-500 hover:text-red-400 transition-colors flex items-center justify-center w-6 h-6 rounded-full hover:bg-red-400/10 active:scale-95" title="Déconnexion">
                            <i class="fas fa-sign-out-alt text-xs"></i>
                        </button>
                    </div>
                    <button id="btn-play" class="btn-aaa w-full text-white font-black tracking-wide relative overflow-hidden text-[15px] py-3">RÉVEILLER LE SLIME</button>
                    <div class="flex items-center gap-2 opacity-70">
                        <div class="h-[1px] bg-gradient-to-r from-transparent to-white/20 flex-1"></div>
                        <span class="text-[8px] font-bold uppercase tracking-widest text-emerald-100/50">Liaison de sécurité</span>
                        <div class="h-[1px] bg-gradient-to-l from-transparent to-white/20 flex-1"></div>
                    </div>
                    <div class="flex gap-2">
                        <button class="social-btn flex-1 text-white hover:bg-white/10 transition flex justify-center items-center gap-1.5 font-bold active:scale-95 text-[10px]">
                            <i class="fab fa-google text-red-400 text-xs"></i> Google
                        </button>
                        <button class="social-btn flex-1 text-white hover:bg-white/10 transition flex justify-center items-center gap-1.5 font-bold active:scale-95 text-[10px]">
                            <i class="fab fa-apple text-white text-xs"></i> Apple
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- LOGIQUE DU SLIME (CANVAS) ---
        const canvas = document.getElementById('slimeCanvas');
        const ctx = canvas.getContext('2d');
        const glassContainer = document.getElementById('glass-container');

        let width, height;
        let time = 0;
        let targetX = 0, targetY = 0, mouseX = 0, mouseY = 0;
        let blinkTimer = 0, isBlinking = false, surprisedTimer = 0;

        let slime = { x: 0, y: 0, baseY: 0, vy: 0, gravity: 0.6, jumpForce: -10, squishX: 1, squishY: 1, idleTimer: 100 };
        const bubbles = []; let taps = [];
        let isLayoutLocked = false;

        function initLayout() {
            if (isLayoutLocked) return;

            width = glassContainer.clientWidth; 
            height = glassContainer.clientHeight;
            
            // Si le CSS n'a pas encore calculé la taille (ex: DOM pas prêt), on patiente
            if (width === 0 || height === 0) {
                setTimeout(initLayout, 50);
                return;
            }

            // Verrouillage définitif de la taille de l'incubateur en pixels !
            const incubator = document.querySelector('.incubator-container');
            incubator.style.width = incubator.offsetWidth + 'px';
            incubator.style.height = incubator.offsetHeight + 'px';
            incubator.style.flexShrink = '0'; // Interdit la compression si le clavier s'ouvre
            
            canvas.width = width; 
            canvas.height = height;
            
            slime.x = width / 2; slime.baseY = height - 15;
            if (slime.y === 0 || slime.y > slime.baseY) slime.y = slime.baseY;

            targetX = width / 2; targetY = height; mouseX = targetX; mouseY = targetY;

            // Initialisation des bulles maintenant que la taille finale est connue
            bubbles.length = 0;
            for(let i=0; i<15; i++) {
                bubbles.push({ x: Math.random() * width, y: Math.random() * height, size: Math.random() * 4 + 1, speed: Math.random() * 2 + 0.5, wobbleSpeed: Math.random() * 0.05 + 0.01, wobbleOffset: Math.random() * Math.PI * 2 });
            }

            isLayoutLocked = true;
        }

        // On lance l'initialisation unique
        initLayout();

        function handleInteraction(e) {
            if(e.cancelable) e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const rect = canvas.getBoundingClientRect();
            targetX = clientX - rect.left; targetY = clientY - rect.top;

            taps.push({ x: targetX, y: targetY, radius: 0, maxRadius: 35, alpha: 1 });
            surprisedTimer = 40; isBlinking = false;
            
            if (slime.y >= slime.baseY - 5) {
                slime.vy = slime.jumpForce * 0.7; slime.squishX = 0.8; slime.squishY = 1.3;
            }
        }

        glassContainer.addEventListener('mousedown', handleInteraction);
        glassContainer.addEventListener('touchstart', handleInteraction, {passive: false});

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            targetX = e.clientX - rect.left; targetY = e.clientY - rect.top;
        });

        function drawSlime() {
            if (!width || !height) { requestAnimationFrame(drawSlime); return; }

            ctx.clearRect(0, 0, width, height); time += 0.05;
            mouseX += (targetX - mouseX) * 0.1; mouseY += (targetY - mouseY) * 0.1;

            ctx.fillStyle = 'rgba(16, 185, 129, 0.3)';
            bubbles.forEach(b => {
                b.y -= b.speed; if(b.y < -10) { b.y = height + 10; b.x = Math.random() * width; }
                const wobble = Math.sin(time * b.wobbleSpeed + b.wobbleOffset) * 2;
                ctx.beginPath(); ctx.arc(b.x + wobble, b.y, b.size, 0, Math.PI * 2); ctx.fill();
            });

            for (let i = taps.length - 1; i >= 0; i--) {
                let tap = taps[i]; tap.radius += 2; tap.alpha -= 0.05;
                ctx.beginPath(); ctx.arc(tap.x, tap.y, tap.radius, 0, Math.PI * 2); ctx.strokeStyle = `rgba(255, 255, 255, ${tap.alpha * 0.5})`; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.arc(tap.x, tap.y, tap.radius * 0.6, 0, Math.PI * 2); ctx.strokeStyle = `rgba(16, 185, 129, ${tap.alpha * 0.3})`; ctx.lineWidth = 4; ctx.stroke();
                if (tap.alpha <= 0) taps.splice(i, 1);
            }

            slime.vy += slime.gravity; slime.y += slime.vy;
            if (slime.y > slime.baseY) {
                slime.y = slime.baseY;
                if (slime.vy > 2) { slime.squishX = 1 + (slime.vy * 0.04); slime.squishY = 1 - (slime.vy * 0.04); }
                slime.vy = 0; slime.idleTimer--;
                if (slime.idleTimer <= 0) { slime.vy = slime.jumpForce * (0.6 + Math.random() * 0.4); slime.squishX = 0.8; slime.squishY = 1.2; slime.idleTimer = 150 + Math.random() * 200; }
            }
            slime.squishX += (1 - slime.squishX) * 0.1; slime.squishY += (1 - slime.squishY) * 0.1;

            const baseRadius = Math.max(20, width * 0.25); 
            const breathScaleX = slime.squishX - Math.sin(time * 0.5) * 0.02; const breathScaleY = slime.squishY + Math.sin(time * 0.5) * 0.02;

            ctx.save(); ctx.translate(slime.x, slime.y); ctx.translate(0, -baseRadius); ctx.scale(breathScaleX, breathScaleY);
            ctx.beginPath(); const numPoints = 30;
            for (let i = 0; i <= numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2; const r = baseRadius + Math.sin(angle * 4 + time * 1.5) * 1.5;
                let px = Math.cos(angle) * r; let py = Math.sin(angle) * r;
                if (py > baseRadius * 0.7) py = baseRadius * 0.7 + Math.sin(px * 0.1 + time) * 1; 
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath();
            
            const slimeGradient = ctx.createRadialGradient(0, -baseRadius * 0.35, 0, 0, 0, baseRadius);
            slimeGradient.addColorStop(0, '#34d399'); slimeGradient.addColorStop(0.7, '#10b981'); slimeGradient.addColorStop(1, '#047857'); 
            ctx.fillStyle = slimeGradient; ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.arc(-baseRadius*0.35, -baseRadius*0.45, baseRadius*0.15, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; ctx.fill();

            if (surprisedTimer > 0) surprisedTimer--; else { blinkTimer--; if(blinkTimer < 0) { isBlinking = true; blinkTimer = Math.random() * 200 + 100; } if(isBlinking && blinkTimer < blinkTimer - 6) isBlinking = false; }

            const centerOfSlimeY = slime.y - baseRadius; const angleToTarget = Math.atan2((mouseY - centerOfSlimeY), (mouseX - slime.x)); const distToTarget = Math.min(Math.hypot(mouseX - slime.x, mouseY - centerOfSlimeY), 30);
            const eyeOffsetX = Math.cos(angleToTarget) * (distToTarget * 0.25); let eyeOffsetY = Math.sin(angleToTarget) * (distToTarget * 0.25); if (eyeOffsetY > 5) eyeOffsetY = 5; 
            const headOffsetX = Math.cos(angleToTarget) * (distToTarget * 0.1); const headOffsetY = Math.sin(angleToTarget) * (distToTarget * 0.1);

            const eyeSpacing = baseRadius * 0.35; const eyeRadius = baseRadius * 0.2; let pupilRadius = baseRadius * 0.11;
            if (surprisedTimer > 0) pupilRadius = 2;

            ctx.translate(headOffsetX, headOffsetY);
            if (isBlinking) { ctx.strokeStyle = '#022c22'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(-eyeSpacing, 0, eyeRadius - 2, 0, Math.PI); ctx.stroke(); ctx.beginPath(); ctx.arc(eyeSpacing, 0, eyeRadius - 2, 0, Math.PI); ctx.stroke(); } 
            else { drawEye(-eyeSpacing, 0, eyeRadius, pupilRadius, eyeOffsetX, eyeOffsetY); drawEye(eyeSpacing, 0, eyeRadius, pupilRadius, eyeOffsetX, eyeOffsetY); }

            ctx.restore(); requestAnimationFrame(drawSlime);
        }

        function drawEye(x, y, radius, pupilRadius, offsetX, offsetY) {
            ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
            const pOffsetX = Math.max(-radius + pupilRadius, Math.min(offsetX, radius - pupilRadius)); const pOffsetY = Math.max(-radius + pupilRadius, Math.min(offsetY, radius - pupilRadius));
            ctx.beginPath();
            if (surprisedTimer > 0) ctx.arc(x + pOffsetX, y + pOffsetY, pupilRadius, 0, Math.PI * 2);
            else ctx.ellipse(x + pOffsetX, y + pOffsetY, pupilRadius, pupilRadius * 1.1, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#0f172a'; ctx.fill();
            if (surprisedTimer === 0) { ctx.beginPath(); ctx.arc(x + pOffsetX - 2, y + pOffsetY - 2, radius*0.25, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill(); }
        }

        drawSlime();

        // --- UI MOCKUP ---
        const overlay = document.getElementById('loading-overlay'); const textLoad = document.getElementById('loading-text');
        const viewAuth = document.getElementById('view-auth'); const viewPlay = document.getElementById('view-play');
        const displayPlayerId = document.getElementById('display-player-id');
        const btnLogin = document.getElementById('btn-login'); const btnGuest = document.getElementById('btn-guest');
        const btnPlay = document.getElementById('btn-play'); const btnLogout = document.getElementById('btn-logout');

        function showLoading(text) { textLoad.innerText = text; overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10); }
        function hideLoading() { overlay.classList.add('opacity-0'); setTimeout(() => { overlay.classList.add('hidden'); }, 300); }
        
        // Changement de vue UI (plus besoin de recalculer la taille, l'incubateur est verrouillé)
        function switchView(hideView, showView) {
            hideView.classList.add('hidden'); hideView.classList.remove('flex');
            showView.classList.remove('hidden'); showView.classList.add('flex');
        }

        btnLogin.addEventListener('click', () => {
            showLoading("Authentification...");
            setTimeout(() => { displayPlayerId.innerText = "PLAYER_X77"; hideLoading(); switchView(viewAuth, viewPlay); }, 1500);
        });

        btnGuest.addEventListener('click', () => {
            showLoading("Création session invité...");
            setTimeout(() => { displayPlayerId.innerText = "GUEST_8902"; hideLoading(); switchView(viewAuth, viewPlay); }, 800);
        });

        btnLogout.addEventListener('click', () => {
            showLoading("Déconnexion...");
            setTimeout(() => { hideLoading(); switchView(viewPlay, viewAuth); document.querySelectorAll('.input-aaa').forEach(input => input.value = ''); }, 1000);
        });

        btnPlay.addEventListener('click', () => {
            showLoading("Synchronisation ADN...");
            setTimeout(() => { textLoad.innerText = "Ouverture incubateur..."; textLoad.classList.replace('text-emerald-400', 'text-white'); }, 1500);
            setTimeout(() => {
                textLoad.innerText = "Succès !";
                setTimeout(() => { hideLoading(); setTimeout(() => textLoad.classList.replace('text-white', 'text-emerald-400'), 300); }, 1000);
            }, 2500);
        });
    </script>
</body>
