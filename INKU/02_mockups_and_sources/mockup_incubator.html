<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incubateur Sci-Fi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animations fluides pour le liquide et les bulles */
        @keyframes rise {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; transform: translateY(-240px) scale(1.1) translateX(3px); }
            100% { transform: translateY(-260px) scale(1.2); opacity: 0; }
        }
        @keyframes rise-alt {
            0% { transform: translateY(0) scale(0.6); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; transform: translateY(-220px) scale(0.9) translateX(-3px); }
            100% { transform: translateY(-250px) scale(1); opacity: 0; }
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        .bubble-1 { animation: rise 4s ease-in infinite; }
        .bubble-2 { animation: rise-alt 3.5s ease-in infinite 1s; }
        .bubble-3 { animation: rise 5s ease-in infinite 2s; }
        .bubble-4 { animation: rise-alt 4.5s ease-in infinite 0.5s; }
        .bubble-5 { animation: rise 3.8s ease-in infinite 1.5s; }
        
        .animate-scanline { animation: scanline 4s linear infinite; }
        
        /* Grille de fond de laboratoire */
        .bg-grid {
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Perspective 3D réaliste pour les pupitres */
        .pupitre-container {
            perspective: 500px;
        }
        .pupitre-top {
            transform-origin: bottom center;
            transform: rotateX(40deg);
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen flex flex-col items-center justify-center p-4 bg-grid font-mono overflow-hidden">

    <!-- Halo lumineux ambiant profond -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[25rem] h-[35rem] bg-cyan-600/5 rounded-full blur-3xl -z-20"></div>

    <!-- Conteneur principal -->
    <div class="relative flex flex-col items-center my-10 w-full max-w-[450px]">

        <!-- ========================================== -->
        <!-- ÉCRAN SUPÉRIEUR (Rendu riche et vitré) -->
        <!-- ========================================== -->
        <div class="mb-6 w-52 h-14 bg-gradient-to-b from-gray-800 to-gray-900 border-2 border-gray-700 rounded-xl shadow-[0_10px_20px_rgba(0,0,0,0.6)] relative flex flex-col items-center justify-center z-20 overflow-hidden">
            <!-- Reflet vitré haut -->
            <div class="absolute top-0 w-full h-1/2 bg-gradient-to-b from-white/5 to-transparent"></div>
            <div class="absolute inset-1 border border-cyan-800/30 rounded-lg"></div>
            <div class="absolute inset-0 rounded-xl pointer-events-none">
                <div class="w-full h-[2px] bg-cyan-400/20 shadow-[0_0_8px_rgba(34,211,238,0.4)] animate-scanline"></div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- COLONNE CENTRALE (100% connectée) -->
        <!-- ========================================== -->
        <div class="relative flex flex-col items-center z-10 drop-shadow-[0_20px_30px_rgba(0,0,0,0.8)]">
            
            <!-- CHAPEAU (Métal cylindrique) -->
            <div class="w-56 h-14 bg-gradient-to-r from-gray-900 via-gray-600 to-gray-900 rounded-t-[2rem] border-b-2 border-gray-950 flex justify-center items-end pb-2 relative z-20">
                <div class="w-28 h-[3px] bg-cyan-500/20 rounded-full shadow-[inset_0_1px_2px_rgba(0,0,0,0.5)]"></div>
                <!-- Douce transition avec le verre -->
                <div class="absolute bottom-0 w-full h-[1px] bg-gradient-to-r from-transparent via-cyan-900/50 to-transparent"></div>
            </div>

            <!-- CORPS EN VERRE (Profondeur et reflets) -->
            <!-- Directement collé sous le chapeau grâce au flex-col -->
            <div class="w-56 h-[26rem] relative bg-gradient-to-r from-cyan-950/80 via-cyan-400/5 to-cyan-950/80 border-x-4 border-gray-800/90 backdrop-blur-sm z-10 overflow-hidden flex flex-col justify-end shadow-[inset_0_0_50px_rgba(6,182,212,0.15)]">
                
                <!-- Reflet de la vitre -->
                <div class="absolute inset-0 w-1/2 bg-gradient-to-r from-transparent via-white/5 to-transparent skew-x-[15deg] transform -translate-x-6 pointer-events-none"></div>
                
                <!-- Scanner -->
                <div class="absolute top-[12%] w-full h-[2px] bg-gradient-to-r from-transparent via-cyan-600/50 to-transparent shadow-[0_0_10px_rgba(8,145,178,0.4)] z-30"></div>

                <!-- LIQUIDE -->
                <div class="relative w-full h-[70%] bg-gradient-to-r from-cyan-700/50 via-cyan-400/10 to-cyan-700/50 border-t border-cyan-300/20">
                    <div class="absolute -top-1 w-full h-2 bg-gradient-to-b from-cyan-300/30 to-transparent blur-[1px]"></div>
                    
                    <!-- Bulles -->
                    <div class="absolute bottom-0 w-2.5 h-2.5 bg-cyan-200/50 rounded-full bubble-1 left-[25%] shadow-[0_0_4px_#a5f3fc]"></div>
                    <div class="absolute bottom-0 w-1.5 h-1.5 bg-cyan-100/60 rounded-full bubble-2 left-[50%]"></div>
                    <div class="absolute bottom-0 w-3 h-3 bg-cyan-300/30 rounded-full bubble-3 left-[75%] shadow-[0_0_6px_#a5f3fc]"></div>
                    <div class="absolute bottom-0 w-2 h-2 bg-cyan-200/70 rounded-full bubble-4 left-[85%]"></div>
                    <div class="absolute bottom-0 w-1 h-1 bg-cyan-100/80 rounded-full bubble-5 left-[35%]"></div>
                    
                    <!-- Ombre de fond du liquide -->
                    <div class="absolute bottom-0 w-full h-1/4 bg-gradient-to-t from-cyan-950/90 to-transparent pointer-events-none"></div>
                </div>
            </div>

            <!-- BASE DE L'INCUBATEUR (Soudée au verre) -->
            <!-- Directement collée sous le verre, aucun espace -->
            <div class="w-56 h-28 bg-gradient-to-r from-gray-900 via-gray-600 to-gray-900 rounded-b-[2.5rem] border-t-2 border-cyan-900/40 z-20 flex flex-col items-center pt-4 relative shadow-[0_15px_25px_rgba(0,0,0,0.8)]">
                <!-- Ligne de structure incrustée -->
                <div class="w-40 h-[2px] bg-gradient-to-r from-transparent via-gray-950 to-transparent opacity-80 mb-3"></div>
                <!-- Fentes d'aération cylindriques -->
                <div class="w-24 h-2 bg-gray-950 rounded-full shadow-[inset_0_2px_4px_rgba(0,0,0,0.9)] mb-2"></div>
                <div class="w-16 h-1.5 bg-gray-950 rounded-full shadow-[inset_0_1px_3px_rgba(0,0,0,0.9)]"></div>
                <!-- Ombre courbée pour le volume -->
                <div class="absolute bottom-1 w-44 h-4 bg-gray-950/70 rounded-full blur-[4px]"></div>
            </div>

            <!-- ========================================== -->
            <!-- PANNEAU LATÉRAL FLOTTANT (Niveau) -->
            <!-- ========================================== -->
            <div class="absolute top-[8rem] left-full ml-[-4px] flex items-center z-0">
                <div class="flex flex-col gap-2 z-0">
                    <div class="w-6 h-[4px] bg-gradient-to-b from-gray-500 to-gray-700 shadow-md"></div>
                    <div class="w-6 h-[4px] bg-gradient-to-b from-gray-600 to-gray-800 shadow-md"></div>
                </div>
                <div class="w-12 h-16 bg-gradient-to-br from-gray-700 via-gray-800 to-gray-900 border border-gray-600/50 rounded-lg shadow-[5px_10px_15px_rgba(0,0,0,0.6)] z-20 flex flex-col items-center py-2.5 px-1 justify-between">
                    <div class="w-full h-8 bg-gray-950 border border-cyan-900/30 rounded flex items-center p-0.5 shadow-[inset_0_2px_5px_rgba(0,0,0,0.8)]">
                        <div class="w-[75%] h-full bg-cyan-600/70 shadow-[0_0_4px_#0891b2] rounded-sm"></div>
                    </div>
                    <button class="w-6 h-6 rounded-full bg-gradient-to-b from-gray-700 to-gray-900 border border-gray-950 shadow-[0_2px_4px_rgba(0,0,0,0.5)] flex items-center justify-center">
                        <div class="w-2.5 h-2.5 rounded-full bg-gray-600 border border-gray-800 shadow-[inset_0_1px_2px_rgba(0,0,0,0.8)]"></div>
                    </button>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- GRANDES CONSOLES INDUSTRIELLES -->
            <!-- ========================================== -->
            <!-- Parfaitement alignées contre la base -->

            <!-- CONSOLE GAUCHE -->
            <div class="absolute bottom-2 right-full w-32 flex flex-col z-30 pupitre-container drop-shadow-[[-5px_15px_15px_rgba(0,0,0,0.7)]]">
                <!-- Pupitre incliné (Perspective restaurée) -->
                <div class="w-full h-20 relative z-10">
                    <div class="w-full h-full bg-gradient-to-b from-gray-500 to-gray-700 border-t border-l border-gray-400/50 rounded-tl-lg pupitre-top flex items-center justify-center shadow-[inset_0_5px_10px_rgba(0,0,0,0.3)] overflow-hidden relative">
                        <div class="absolute bottom-0 w-full h-3 bg-gradient-to-t from-gray-900/50 to-transparent"></div>
                        <!-- Radar -->
                        <div class="w-12 h-12 rounded-full border-[1.5px] border-cyan-700/40 bg-gray-900/40 flex items-center justify-center relative shadow-inner mt-2">
                            <div class="w-full h-[1px] bg-cyan-700/40 absolute"></div>
                            <div class="h-full w-[1px] bg-cyan-700/40 absolute"></div>
                            <div class="w-6 h-6 rounded-full border border-cyan-500/30"></div>
                            <div class="absolute top-2 left-3 w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse shadow-[0_0_6px_#22d3ee]"></div>
                        </div>
                    </div>
                </div>
                <!-- Bloc Avant Massif -->
                <div class="w-full h-[100px] bg-gradient-to-b from-gray-700 via-gray-800 to-gray-950 border-t-2 border-gray-600 border-l border-b border-gray-900 rounded-bl-xl shadow-[inset_0_2px_4px_rgba(255,255,255,0.05)] p-3 relative -mt-1 z-20">
                    <div class="w-full h-full bg-gray-950 border border-gray-800/80 rounded-md shadow-[inset_0_5px_10px_rgba(0,0,0,0.9)] relative overflow-hidden">
                        <!-- Vis métalliques -->
                        <div class="absolute top-2 left-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <div class="absolute top-2 right-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <div class="absolute bottom-2 left-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <div class="absolute bottom-2 right-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <!-- Reflet vitré de l'écran -->
                        <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>
                    </div>
                </div>
            </div>

            <!-- CONSOLE DROITE -->
            <div class="absolute bottom-2 left-full w-32 flex flex-col z-30 pupitre-container drop-shadow-[[5px_15px_15px_rgba(0,0,0,0.7)]]">
                <!-- Pupitre incliné (Perspective restaurée) -->
                <div class="w-full h-20 relative z-10">
                    <div class="w-full h-full bg-gradient-to-b from-gray-500 to-gray-700 border-t border-r border-gray-400/50 rounded-tr-lg pupitre-top flex flex-col items-center justify-center gap-2 shadow-[inset_0_5px_10px_rgba(0,0,0,0.3)] overflow-hidden relative px-4">
                        <div class="absolute bottom-0 w-full h-3 bg-gradient-to-t from-gray-900/50 to-transparent"></div>
                        <!-- Jauges -->
                        <div class="flex gap-2.5 w-full h-1/2 justify-between mt-3">
                            <div class="w-1/3 bg-gray-900 border border-gray-800 rounded-sm shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)] flex items-end p-[1px]"><div class="w-full h-[60%] bg-cyan-600/80 rounded-[1px] shadow-[0_0_3px_#0891b2]"></div></div>
                            <div class="w-1/3 bg-gray-900 border border-gray-800 rounded-sm shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)] flex items-end p-[1px]"><div class="w-full h-[90%] bg-cyan-400/80 rounded-[1px] shadow-[0_0_4px_#22d3ee]"></div></div>
                            <div class="w-1/3 bg-gray-900 border border-gray-800 rounded-sm shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)] flex items-end p-[1px]"><div class="w-full h-[40%] bg-cyan-800/80 rounded-[1px]"></div></div>
                        </div>
                        <div class="w-full h-1.5 bg-gray-900 rounded-full shadow-inner opacity-80 mb-1"></div>
                    </div>
                </div>
                <!-- Bloc Avant Massif -->
                <div class="w-full h-[100px] bg-gradient-to-b from-gray-700 via-gray-800 to-gray-950 border-t-2 border-gray-600 border-r border-b border-gray-900 rounded-br-xl shadow-[inset_0_2px_4px_rgba(255,255,255,0.05)] p-3 relative -mt-1 z-20">
                    <div class="w-full h-full bg-gray-950 border border-gray-800/80 rounded-md shadow-[inset_0_5px_10px_rgba(0,0,0,0.9)] relative overflow-hidden">
                        <!-- Vis métalliques -->
                        <div class="absolute top-2 left-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <div class="absolute top-2 right-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <div class="absolute bottom-2 left-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <div class="absolute bottom-2 right-2 w-1.5 h-1.5 rounded-full bg-gray-500 shadow-inner"></div>
                        <!-- Reflet vitré de l'écran -->
                        <div class="absolute inset-0 bg-gradient-to-bl from-white/5 to-transparent pointer-events-none"></div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
