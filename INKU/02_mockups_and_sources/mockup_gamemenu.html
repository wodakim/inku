<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Inkü - Le Laboratoire</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        abyssal: '#04060c',
                        emerald: '#10b981',
                        cyan: '#3b82f6',
                        alert: '#ef4444',
                        glass: 'rgba(2, 6, 23, 0.6)',
                    },
                    fontFamily: { nunito: ['Nunito', 'sans-serif'], mono: ['"Fira Code"', 'monospace'] }
                }
            }
        }
    </script>

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --nav-h: 80px;
            --diamond-s: 72px;
            --diamond-top: -24px;
            --nav-radius: 32px;
            --nav-ease: cubic-bezier(0.22, 1, 0.36, 1);
            --nav-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; }

        html,
        body {
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        body {
            margin: 0; padding: 0; background-color: #04060c; color: white;
            height: 100dvh; overflow: hidden; font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        .bg-industrial {
            position: absolute; inset: 0; z-index: 0;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px),
                linear-gradient(to bottom, #04060c 0%, #0a0f1c 50%, #04060c 100%);
        }

        .glass-panel {
            background: rgba(2, 6, 23, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-bottom: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }

        .glass-pill {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-active-scale:active { transform: scale(0.92); }

        /* --- NAVBAR BASSE RETRAVAILLÉE UNIQUEMENT --- */
        .nav-shell {
            position: relative;
            overflow: visible;
            border-radius: var(--nav-radius);
            isolation: isolate;
        }

        .nav-shell::before {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: calc(var(--nav-radius) - 1px);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.005)),
                radial-gradient(circle at 50% -30%, rgba(16,185,129,0.12), transparent 56%);
            pointer-events: none;
            z-index: 0;
        }

        .nav-shell::after {
            content: "";
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 10px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(16,185,129,0.2), rgba(59,130,246,0.18), rgba(16,185,129,0.2), transparent);
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
        }

        .nav-track-glow {
            position: absolute;
            top: 12px;
            bottom: 14px;
            width: calc(20% - 8px);
            left: 4px;
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(16,185,129,0.12), rgba(59,130,246,0.04));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 0 16px rgba(16,185,129,0.12);
            opacity: 0.95;
            transform: translateX(0);
            transition: transform 0.52s var(--nav-ease);
            pointer-events: none;
            z-index: 1;
        }

        .nav-energy-line {
            position: absolute;
            top: 10px;
            left: 14px;
            width: calc(20% - 28px);
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(16,185,129,0.88), rgba(103,232,249,0.95), rgba(16,185,129,0.88), transparent);
            box-shadow: 0 0 12px rgba(16,185,129,0.6);
            transform: translateX(0) scaleX(0.92);
            transition: transform 0.52s var(--nav-ease);
            pointer-events: none;
            z-index: 2;
        }

        .nav-btn {
            position: relative;
            z-index: 3;
        }

        .nav-btn::before {
            content: "";
            position: absolute;
            inset: 10px 8px;
            border-radius: 24px;
            background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            opacity: 0;
            transform: scale(0.88);
            transition: transform 0.24s ease, opacity 0.24s ease;
            pointer-events: none;
        }

        .nav-btn.is-pressed::before { opacity: 1; transform: scale(1); }

        .nav-hit-sheen {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            overflow: hidden;
            pointer-events: none;
        }

        .nav-hit-sheen::before {
            content: "";
            position: absolute;
            top: -30%;
            bottom: -30%;
            left: -42%;
            width: 40%;
            transform: rotate(20deg);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
            opacity: 0;
        }

        .nav-btn.is-pressed .nav-hit-sheen::before {
            opacity: 1;
            animation: nav-sheen 0.5s ease;
        }

        .nav-icon-container {
            width: 44px; height: 44px;
            display: grid; place-items: center;
            transition: transform 0.5s var(--nav-bounce), color 0.28s ease, filter 0.28s ease;
            z-index: 30;
            border-radius: 16px;
            position: relative;
        }

        .nav-icon-container::before {
            content: "";
            position: absolute;
            inset: 4px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            opacity: 0;
            transition: opacity 0.28s ease;
        }

        .nav-icon-container > * {
            position: relative;
            z-index: 1;
        }

        .nav-text {
            position: absolute; bottom: 12px; left: 0; right: 0; text-align: center;
            font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em;
            transition: all 0.4s ease; opacity: 0.6;
        }

        .nav-btn.is-active .nav-icon-container {
            transform: translateY(-28px) scale(1.22);
            color: #ecfeff;
            filter: drop-shadow(0 0 12px rgba(16,185,129,0.46));
        }

        .nav-btn.is-active .nav-icon-container::before {
            opacity: 1;
            background: linear-gradient(180deg, rgba(16,185,129,0.18), rgba(59,130,246,0.05));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 18px rgba(16,185,129,0.12);
        }

        .nav-btn.is-active .nav-text {
            opacity: 0; transform: translateY(12px) scale(0.5);
        }

        .slime-cursor {
            position: absolute;
            top: var(--diamond-top);
            left: 0;
            width: var(--diamond-s);
            height: var(--diamond-s);
            pointer-events: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateX(0);
            transition: transform 0.62s var(--nav-bounce);
            filter: drop-shadow(0 16px 24px rgba(0,0,0,0.36));
            will-change: transform;
        }

        .slime-cursor.elastic-travel {
            animation: diamond-elastic-travel 0.62s var(--nav-bounce);
        }

        .slime-core {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            transform: rotate(45deg);
            background:
                linear-gradient(135deg, rgba(16,185,129,0.94) 0%, rgba(12, 74, 110, 0.94) 100%);
            border: 1.5px solid rgba(255,255,255,0.14);
            box-shadow:
                0 0 22px rgba(16,185,129,0.34),
                0 0 28px rgba(59,130,246,0.16),
                inset 0 1px 0 rgba(255,255,255,0.2),
                inset 0 -10px 16px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .slime-core::before {
            content: "";
            position: absolute;
            inset: 6px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.02));
        }

        .slime-core::after {
            content: "";
            position: absolute;
            top: 5px;
            left: 15px;
            right: 15px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
            opacity: 0.75;
            filter: blur(1px);
        }

        .slime-stretch-transition {
            transition: transform 0.18s ease-out;
            transform-origin: center;
            will-change: transform;
        }

        .slime-ring,
        .slime-pulse {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            transform: rotate(45deg);
        }

        .slime-ring {
            border: 1px solid rgba(255,255,255,0.14);
            transform: rotate(45deg) scale(1.14);
            opacity: 0.38;
        }

        .slime-pulse {
            border: 1px solid rgba(16,185,129,0.18);
            animation: pulse-ring 2.4s ease-in-out infinite;
            opacity: 0.65;
        }

        .slime-indicator {
            position: absolute;
            bottom: -2px;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #10b981;
            box-shadow: 0 0 12px rgba(16,185,129,0.9);
            animation: dot-breathe 2s ease-in-out infinite;
        }

        @keyframes nav-sheen {
            0% { transform: rotate(20deg) translateX(-140%); }
            100% { transform: rotate(20deg) translateX(250%); }
        }

        @keyframes pulse-ring {
            0%, 100% { transform: rotate(45deg) scale(1.06); opacity: 0.55; }
            50% { transform: rotate(45deg) scale(1.18); opacity: 0.14; }
        }

        @keyframes dot-breathe {
            0%, 100% { transform: scale(1); opacity: 0.96; }
            50% { transform: scale(1.22); opacity: 0.66; }
        }

        @keyframes diamond-elastic-travel {
            0% { filter: drop-shadow(0 10px 18px rgba(0,0,0,0.28)); }
            25% { filter: drop-shadow(0 18px 28px rgba(0,0,0,0.4)); }
            100% { filter: drop-shadow(0 16px 24px rgba(0,0,0,0.36)); }
        }

        @keyframes float-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        @media (max-width: 380px) {
            :root {
                --nav-h: 76px;
                --diamond-s: 68px;
                --diamond-top: -22px;
            }

            .nav-text { font-size: 8px; }
            .nav-icon-container { width: 42px; height: 42px; }
            .nav-btn.is-active .nav-icon-container { transform: translateY(-25px) scale(1.18); }
        }
    </style>
</head>

        </div>

    <script>
        let currentNavIndex = -1;
        let navElasticTimeout = null;

        function flashNavPress(button) {
            button.classList.add('is-pressed');
            clearTimeout(button._pressFx);
            button._pressFx = setTimeout(() => button.classList.remove('is-pressed'), 220);
        }

        function setNav(targetIndex) {
            if (targetIndex === currentNavIndex) return;

            const buttons = document.querySelectorAll('.nav-btn');
            const cursor = document.getElementById('slime-cursor');
            const stretchWrapper = document.getElementById('slime-stretch');
            const navContainer = document.getElementById('nav-container');
            const navTrackGlow = document.getElementById('nav-track-glow');
            const navEnergyLine = document.getElementById('nav-energy-line');

            buttons.forEach((btn, idx) => {
                const icon = btn.querySelector('i');
                if (idx === targetIndex) {
                    btn.classList.add('is-active');
                    icon.className = icon.className.replace('ph-duotone', 'ph-fill');
                } else {
                    btn.classList.remove('is-active');
                    icon.className = icon.className.replace('ph-fill', 'ph-duotone');
                }
            });

            const btnWidth = navContainer.offsetWidth / buttons.length;
            const targetX = (targetIndex * btnWidth) + (btnWidth / 2) - (cursor.offsetWidth / 2);
            const trackX = (targetIndex * btnWidth) + 4;
            const lineX = (targetIndex * btnWidth) + 10;

            if (currentNavIndex !== -1) {
                const delta = targetIndex - currentNavIndex;
                const distance = Math.abs(delta);
                const direction = delta >= 0 ? 1 : -1;
                const horizontalBoost = Math.min(0.18 + (distance * 0.08), 0.34);
                const verticalBoost = Math.min(0.14 + (distance * 0.05), 0.26);

                cursor.classList.remove('elastic-travel');
                void cursor.offsetWidth;
                cursor.classList.add('elastic-travel');

                stretchWrapper.style.transform = `scaleX(${1 + horizontalBoost}) scaleY(${1 - verticalBoost}) rotate(${direction * 4}deg)`;
                clearTimeout(navElasticTimeout);
                navElasticTimeout = setTimeout(() => {
                    stretchWrapper.style.transform = 'scaleX(0.94) scaleY(1.08) rotate(0deg)';
                    setTimeout(() => {
                        stretchWrapper.style.transform = 'scaleX(1.03) scaleY(0.98) rotate(0deg)';
                        setTimeout(() => {
                            stretchWrapper.style.transform = 'scaleX(1) scaleY(1) rotate(0deg)';
                        }, 110);
                    }, 110);
                }, 120);
            } else {
                stretchWrapper.style.transform = 'scaleX(1) scaleY(1) rotate(0deg)';
            }

            cursor.style.transform = `translateX(${targetX}px)`;
            navTrackGlow.style.transform = `translateX(${trackX}px)`;
            navEnergyLine.style.transform = `translateX(${lineX}px) scaleX(1)`;
            currentNavIndex = targetIndex;
        }

        function toggleProfileModal() {
            const m = document.getElementById('profile-modal');
            const c = document.getElementById('profile-card');
            const isOpen = !m.classList.contains('opacity-0');
            m.classList.toggle('opacity-0'); m.classList.toggle('pointer-events-none');
            c.classList.toggle('scale-90'); c.classList.toggle('scale-100');
        }

        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function resize() { 
            w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; 
            if(currentNavIndex !== -1) { const idx = currentNavIndex; currentNavIndex = -1; setNav(idx); }
        }

        class P {
            constructor() { this.reset(); }
            reset() { this.x = Math.random()*w; this.y = Math.random()*h; this.s = Math.random()*1.2; this.vy = -Math.random()*0.4; this.a = Math.random()*0.4; }
            update() { this.y += this.vy; if(this.y < 0) this.reset(); }
            draw() { ctx.fillStyle=`rgba(16,185,129,${this.a})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill(); }
        }

        document.querySelectorAll('.nav-btn').forEach((button, index) => {
            button.addEventListener('touchstart', () => flashNavPress(button), { passive: true });
            button.addEventListener('mousedown', () => flashNavPress(button));
        });

        document.addEventListener('gesturestart', (event) => {
            event.preventDefault();
        });

        window.addEventListener('resize', resize);
        window.onload = () => { 
            resize(); for(let i=0; i<40; i++) particles.push(new P()); 
            function animate() {
                ctx.clearRect(0,0,w,h);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate(); 
            setTimeout(() => setNav(2), 100);
        };
    </script>
</body>
</html>
